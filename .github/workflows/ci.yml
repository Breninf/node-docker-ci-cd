name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test   # 🔥 só roda se testes passarem

    if: github.ref == 'refs/heads/main'  # 🔥 só na main

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t node-api .